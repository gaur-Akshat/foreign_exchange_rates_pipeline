base_currency: USD

target_currencies:
  - EUR
  - GBP
  - JPY
  - INR
  - CAD
  - AUD

api:
  url: "https://api.frankfurter.app"
  timeout: 10

paths:
  bronze: "data/bronze/exchange_rates"
  silver: "data/silver/exchange_rates"
  gold: "data/gold/marts"
  logs: "data/logs"

pipeline:
  backfill_days: 30
  retention_days: 30

database:
  enabled: true
  silver_table: "silver_exchange_rates"

logging:
  level: "INFO"